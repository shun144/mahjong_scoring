<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans CJK JP','Noto Sans JP',sans-serif;background:#fff;color:#3f4854;}
  .card{background:#fff;}
  .seclabel{display:inline-block;background:#eef2f7;color:#3f4854;font-weight:700;
    font-size:17px;padding:7px 16px;border-radius:20px;margin-bottom:20px;}
  .seclabel .num{color:#4f86e8;margin-right:6px;}
  .note{font-size:12.5px;color:#98a1ac;margin-top:18px;line-height:1.6;}

  .card{width:760px;padding:34px 38px 36px;}
  table{width:100%;border-collapse:collapse;border-radius:14px;overflow:hidden;
    box-shadow:0 0 0 1px #e9edf2;}
  th{background:#f3f6fa;color:#5a636e;font-size:14px;font-weight:700;padding:13px 18px;text-align:left;}
  th.c,td.c{text-align:center;}
  td{padding:12px 18px;font-size:16px;border-top:1px solid #eef1f5;}
  tr:nth-child(even) td{background:#fbfcfd;}
  .yk{font-weight:700;color:#3f4854;}
  .hb{display:inline-block;min-width:48px;text-align:center;color:#fff;font-weight:800;
    font-size:14px;padding:4px 10px;border-radius:9px;}
  .kd b{font-weight:800;color:#3f4854;}
  .kd .x{color:#aab2bc;font-size:13.5px;font-weight:600;}
</style></head><body><div class="card">
  <div class="seclabel">主要な役と翻数</div>
  <table>
    <tr><th>役</th><th class="c">門前</th><th>鳴き（食い下がり）</th></tr>
    <tr><td class="yk">リーチ</td>
      <td><span class="hb" style="background:#2fa96b">1翻</span></td>
      <td class="kd"><span class="x">門前のみ</span></td></tr><tr><td class="yk">タンヤオ</td>
      <td><span class="hb" style="background:#2fa96b">1翻</span></td>
      <td class="kd"><b>1翻</b></td></tr><tr><td class="yk">平和</td>
      <td><span class="hb" style="background:#2fa96b">1翻</span></td>
      <td class="kd"><span class="x">門前のみ</span></td></tr><tr><td class="yk">一盃口</td>
      <td><span class="hb" style="background:#2fa96b">1翻</span></td>
      <td class="kd"><span class="x">門前のみ</span></td></tr><tr><td class="yk">役牌（飜牌）</td>
      <td><span class="hb" style="background:#2fa96b">1翻</span></td>
      <td class="kd"><b>1翻</b></td></tr><tr><td class="yk">三色同順</td>
      <td><span class="hb" style="background:#4f86e8">2翻</span></td>
      <td class="kd"><b>1翻</b></td></tr><tr><td class="yk">一気通貫</td>
      <td><span class="hb" style="background:#4f86e8">2翻</span></td>
      <td class="kd"><b>1翻</b></td></tr><tr><td class="yk">チャンタ</td>
      <td><span class="hb" style="background:#4f86e8">2翻</span></td>
      <td class="kd"><b>1翻</b></td></tr><tr><td class="yk">七対子</td>
      <td><span class="hb" style="background:#4f86e8">2翻</span></td>
      <td class="kd"><span class="x">門前のみ</span></td></tr><tr><td class="yk">混一色（ホンイツ）</td>
      <td><span class="hb" style="background:#8b6fd4">3翻</span></td>
      <td class="kd"><b>2翻</b></td></tr><tr><td class="yk">純チャン</td>
      <td><span class="hb" style="background:#8b6fd4">3翻</span></td>
      <td class="kd"><b>2翻</b></td></tr><tr><td class="yk">清一色（チンイツ）</td>
      <td><span class="hb" style="background:#e0574f">6翻</span></td>
      <td class="kd"><b>5翻</b></td></tr>
  </table>
  <div class="note">※ ドラは役ではありませんが、翻数に加算されます（ドラだけではあがれません）。<br>
  ※ 一飜縛り・喰い断ありの一般ルールを前提にしています。</div>
</div></body></html>
