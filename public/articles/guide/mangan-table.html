<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans CJK JP','Noto Sans JP',sans-serif;background:#fff;color:#3f4854;}
  .card{background:#fff;}
  .seclabel{display:inline-block;background:#eef2f7;color:#3f4854;font-weight:700;
    font-size:17px;padding:7px 16px;border-radius:20px;margin-bottom:20px;}
  .seclabel .num{color:#4f86e8;margin-right:6px;}
  .note{font-size:12.5px;color:#98a1ac;margin-top:18px;line-height:1.6;}

  .card{width:760px;padding:34px 38px 36px;}
  table{width:100%;border-collapse:collapse;border-radius:14px;overflow:hidden;
    box-shadow:0 0 0 1px #e9edf2;}
  th{background:#f3f6fa;color:#5a636e;font-size:14px;font-weight:700;padding:13px 20px;text-align:left;}
  th.r,td.sc{text-align:right;}
  td{padding:15px 20px;border-top:1px solid #eef1f5;}
  .tier{font-size:19px;font-weight:800;color:#3f4854;}
  .dot{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:10px;
    vertical-align:middle;}
  .hn{font-size:14px;color:#7a828d;font-weight:600;}
  .sc{font-size:22px;font-weight:800;}
</style></head><body><div class="card">
  <div class="seclabel">満貫以上の点数</div>
  <table>
    <tr><th>区切り</th><th>翻</th><th class="r">子</th><th class="r">親</th></tr>
    <tr>
      <td class="tier"><span class="dot" style="background:#5b8ff0"></span>満貫</td>
      <td class="hn">5翻</td>
      <td class="sc" style="color:#5b8ff0">8000</td>
      <td class="sc" style="color:#5b8ff0">12000</td></tr><tr>
      <td class="tier"><span class="dot" style="background:#8b6fd4"></span>跳満</td>
      <td class="hn">6〜7翻</td>
      <td class="sc" style="color:#8b6fd4">12000</td>
      <td class="sc" style="color:#8b6fd4">18000</td></tr><tr>
      <td class="tier"><span class="dot" style="background:#ef8a4b"></span>倍満</td>
      <td class="hn">8〜10翻</td>
      <td class="sc" style="color:#ef8a4b">16000</td>
      <td class="sc" style="color:#ef8a4b">24000</td></tr><tr>
      <td class="tier"><span class="dot" style="background:#e0574f"></span>三倍満</td>
      <td class="hn">11〜12翻</td>
      <td class="sc" style="color:#e0574f">24000</td>
      <td class="sc" style="color:#e0574f">36000</td></tr><tr>
      <td class="tier"><span class="dot" style="background:#c0392f"></span>役満</td>
      <td class="hn">13翻／役満役</td>
      <td class="sc" style="color:#c0392f">32000</td>
      <td class="sc" style="color:#c0392f">48000</td></tr>
  </table>
  <div class="note">※ 点数は総得点（ロンの場合）。ツモは各家で分けて支払います。<br>
  ※ 切り上げ満貫など一部の扱いはルールにより異なります。</div>
</div></body></html>
