<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans CJK JP','Noto Sans JP',sans-serif;background:#fff;color:#3f4854;}
  .card{background:#fff;}
  .seclabel{display:inline-block;background:#eef2f7;color:#3f4854;font-weight:700;
    font-size:17px;padding:7px 16px;border-radius:20px;margin-bottom:20px;}
  .seclabel .num{color:#4f86e8;margin-right:6px;}
  .note{font-size:12.5px;color:#98a1ac;margin-top:18px;line-height:1.6;}

  .card{width:1000px;padding:36px 40px 40px;overflow:hidden;}
  .row{white-space:nowrap;text-align:center;}
  .step{display:inline-block;vertical-align:middle;width:256px;height:250px;
    border:2px solid #e9edf2;border-radius:18px;padding:22px 20px;text-align:center;
    position:relative;background:#fff;}
  .step .badge{width:46px;height:46px;border-radius:50%;color:#fff;font-size:24px;
    font-weight:800;line-height:46px;margin:0 auto 12px;}
  .step h3{font-size:21px;font-weight:800;margin-bottom:8px;}
  .step p{font-size:13.5px;color:#7a828d;line-height:1.6;min-height:44px;}
  .chip{display:inline-block;margin-top:12px;padding:7px 12px;border-radius:10px;
    font-size:13px;font-weight:700;}
  .stile{display:inline-block;width:30px;height:40px;background-size:contain;
    background-repeat:no-repeat;background-position:center;vertical-align:bottom;margin:0 1px;}
  .s1 .badge{background:#4f86e8;} .s1 h3{color:#3a6fd0;} .s1 .chip{background:#e4edfd;color:#3a6fd0;}
  .s2 .badge{background:#2fa96b;} .s2 h3{color:#248a56;} .s2 .chip{background:#e0f3ea;color:#248a56;}
  .s3 .badge{background:#ef8a4b;} .s3 h3{color:#d5732f;} .s3 .chip{background:#fdeadd;color:#d5732f;}
  .arrow{display:inline-block;vertical-align:middle;width:42px;text-align:center;
    font-size:34px;color:#c4cbd3;font-weight:700;}
  .foot{margin-top:26px;text-align:center;background:#f6f8fb;border-radius:12px;
    padding:14px;font-size:15px;font-weight:700;color:#5a636e;}

  <div class="seclabel">点数が決まる3ステップ</div>
  <div class="row">
    <div class="step s1"><div class="badge">1</div><h3>符を数える</h3>
      <p>あがりの形から、20符を土台に加算していく</p>
      <div><span class="stile t-chun "></span><span class="stile t-chun "></span><span class="stile t-chun "></span><span class="stile t-hatsu "></span><span class="stile t-hatsu "></span></div>
      <div class="chip">20符 ＋ 面子・雀頭・待ち</div></div>
    <div class="arrow">→</div>
    <div class="step s2"><div class="badge">2</div><h3>翻を数える</h3>
      <p>成立した役の翻数と、ドラの枚数を合計する</p>
      <div class="chip" style="margin-top:52px">リーチ＋ツモ＋平和＋ドラ…</div></div>
    <div class="arrow">→</div>
    <div class="step s3"><div class="badge">3</div><h3>点数に変換</h3>
      <p>符と翻から基本点を出し、親子・ロンツモで倍率をかける</p>
      <div class="chip" style="margin-top:32px">基本点 = 符 × 2<sup>(2+翻)</sup></div></div>
  </div>
  <div class="foot">どんな手でも、この順番は同じ</div>
