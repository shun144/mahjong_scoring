    box-shadow:0 1px 2px rgba(60,72,84,.16);}
  .tile .glyph{display:block;width:100%;height:100%;background-size:contain;
    background-repeat:no-repeat;background-position:center;}

  /* group tints */
  .tint-mute .tiles{background:#f1f3f6;}
  .tint-blue .tiles{background:#e4edfd;}
  .tint-yellow .tiles{background:#fdf3d9;}
  .tint-orange .tiles{background:#fdeadd;}

  .glabel.mute{color:#98a1ac;}
  .glabel.blue{color:#3f74d6;}
  .glabel.yellow{color:#b78a1c;}
  .glabel.orange{color:#dd7433;}

  /* winning tile ring + ron badge */
  .win{position:relative;box-shadow:0 0 0 3px #ef8a4b;border-radius:6px;}
  .ronbadge{position:absolute;top:-10px;left:50%;margin-left:-19px;width:38px;
    background:#ef8a4b;color:#fff;font-size:11px;font-weight:700;line-height:16px;
    border-radius:8px;text-align:center;}

  /* contribution tags under groups */
  .tag{display:inline-block;font-weight:700;border-radius:9px;padding:5px 9px;
    font-size:12.5px;line-height:1.35;min-width:96px;}
  .tag small{display:block;font-size:10.5px;font-weight:500;opacity:.9;}
  .tag-mute{background:#eef1f4;color:#98a1ac;}
  .tag-blue{background:#4f86e8;color:#fff;}
  .tag-yellow{background:#f2c14e;color:#5a4a12;}
  .tag-orange{background:#ef8a4b;color:#fff;}

  /* divider */
  .divider{text-align:center;margin:14px 0 20px;}
  .divider .line{display:inline-block;width:100%;border-top:2px dashed #dfe4ea;
    position:relative;top:-9px;}
  .divider .chip{display:inline-block;background:#fff;color:#7a828d;font-size:13px;
    font-weight:700;padding:0 14px;position:relative;top:0;}

  /* ---- stack ---- */
  .stackwrap{position:relative;}
  .stack{display:inline-block;vertical-align:middle;width:560px;}
  .blk{position:relative;height:52px;margin-bottom:3px;border-radius:6px;color:#fff;}
  .blk .name{position:absolute;left:20px;top:0;height:100%;line-height:52px;
    font-weight:700;font-size:16px;}
  .blk .name small{font-weight:500;font-size:12px;opacity:.85;}
  .blk .val{position:absolute;right:18px;top:0;height:100%;line-height:52px;
    font-weight:700;font-size:19px;}
  .b-wait{background:#ef8a4b;}
  .b-pair{background:#f2c14e;color:#5a4a12;}
  .b-meld{background:#4f86e8;}
  .b-agari{background:#8892a0;}
  .b-futei{background:#a7b0ba;height:60px;}
  .b-futei .name,.b-futei .val{line-height:60px;}
  .blk.top{border-radius:10px 10px 6px 6px;}
  .blk.bottom{border-radius:6px 6px 10px 10px;}

  /* total card */
  .total{display:inline-block;vertical-align:middle;margin-left:40px;
    text-align:center;padding:20px 26px;border:2px solid #e6eaef;border-radius:16px;
    background:#fbfcfd;}
  .total .sum{font-size:15px;color:#7a828d;font-weight:700;}
  .total .sumv{font-size:26px;color:#48515c;font-weight:800;margin:2px 0 8px;}
  .total .arrow{font-size:18px;color:#b7bec6;margin:2px 0;}
  .total .res{font-size:15px;color:#2fa96b;font-weight:700;}

<div class="card">

  <div class="seclabel"><span class="num">①</span>実際のアガリ手牌</div>
  <div class="hand">

    <div class="grp tint-mute">
      <div class="glabel mute">順子（待ちの面子）</div>
      <div class="tiles"><span class="tile "><span class="glyph t-man4"></span></span><span class="win"><span class="tile "><span class="glyph t-man5"></span></span><span class="ronbadge">ロン</span></span><span class="tile "><span class="glyph t-man6"></span></span></div>
      <div class="gtag"><span class="tag tag-orange">待ち：カンチャン +2符<small>順子そのものは0符</small></span></div>
    </div>

    <div class="grp tint-mute">
      <div class="glabel mute">順子</div>
      <div class="tiles"><span class="tile "><span class="glyph t-pin2"></span></span><span class="tile "><span class="glyph t-pin3"></span></span><span class="tile "><span class="glyph t-pin4"></span></span></div>
      <div class="gtag"><span class="tag tag-mute">0符</span></div>
    </div>

    <div class="grp tint-mute">
      <div class="glabel mute">順子</div>
      <div class="tiles"><span class="tile "><span class="glyph t-pin6"></span></span><span class="tile "><span class="glyph t-pin7"></span></span><span class="tile "><span class="glyph t-pin8"></span></span></div>
      <div class="gtag"><span class="tag tag-mute">0符</span></div>
    </div>

    <div class="grp tint-blue">
      <div class="glabel blue">面子（暗刻）</div>
      <div class="tiles"><span class="tile "><span class="glyph t-chun"></span></span><span class="tile "><span class="glyph t-chun"></span></span><span class="tile "><span class="glyph t-chun"></span></span></div>
      <div class="gtag"><span class="tag tag-blue">暗刻：字牌 +8符</span></div>
    </div>

    <div class="grp tint-yellow">
      <div class="glabel yellow">雀頭</div>
      <div class="tiles"><span class="tile "><span class="glyph t-hatsu"></span></span><span class="tile "><span class="glyph t-hatsu"></span></span></div>
      <div class="gtag"><span class="tag tag-yellow">役牌の雀頭 +2符</span></div>
    </div>

  </div>

  <div class="divider"><span class="line"></span><span class="chip">この5つを確認して下に積み上げる</span></div>

  <div class="seclabel"><span class="num">②</span>符の積み上げ図</div>
  <div class="stackwrap">
    <div class="stack">
      <div class="blk b-wait top"><span class="name">待ち <small>カンチャン</small></span><span class="val">+2符</span></div>
      <div class="blk b-pair"><span class="name">雀頭 <small>役牌（發）</small></span><span class="val">+2符</span></div>
      <div class="blk b-meld"><span class="name">面子 <small>中の暗刻（字牌）</small></span><span class="val">+8符</span></div>
      <div class="blk b-agari"><span class="name">あがり方 <small>門前ロン（牌に関係なく付く）</small></span><span class="val">+10符</span></div>
      <div class="blk b-futei bottom"><span class="name">副底 <small>すべての手の土台（自動で付く）</small></span><span class="val">20符</span></div>
    </div>
    <div class="total">
      <div class="sum">合計</div>
      <div class="sumv">42符</div>
      <div class="arrow">▼ 切り上げ</div>
      <div class="res">10符単位で切り上げ</div>
      <div class="resv">50符</div>
    </div>
  </div>

</div>
