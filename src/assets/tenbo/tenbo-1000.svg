<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 96" width="640" height="96" role="img" aria-label="麻雀の1000点棒">
  <title>1000点棒</title>
  <defs>
    <linearGradient id="body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#fbfaf6"/>
      <stop offset="1" stop-color="#eeece4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="dot" cx="0.38" cy="0.34" r="0.75">
      <stop offset="0" stop-color="#e34a54"/>
      <stop offset="0.55" stop-color="#c8102e"/>
      <stop offset="1" stop-color="#a20d24"/>
    </radialGradient>
  </defs>

  <!-- 本体 -->
  <rect x="4" y="4" width="632" height="88" rx="18" ry="18"
        fill="url(#body)" stroke="#d3cec2" stroke-width="2"/>

  <!-- 上面のハイライト -->
  <rect x="14" y="11" width="612" height="26" rx="13" ry="13" fill="url(#shine)"/>

  <!-- 1000点＝赤丸1つ -->
  <circle cx="320" cy="48" r="13" fill="url(#dot)"/>
  <circle cx="320" cy="48" r="13" fill="none" stroke="#8f0b1f" stroke-opacity="0.35" stroke-width="1"/>
</svg>
