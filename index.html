<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/icons/favicon.ico" sizes="any" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="manifest" href="/icons/site.webmanifest" />
    <meta name="theme-color" content="#146F45" />
    <!--
      title / meta description / canonical はルートごとに RouteMeta が出し分ける
      （React 19 のメタデータ巻き上げ）。静的 title を置くと React が追加する title
      より先頭の静的側が優先され、ルート別 title が無効になるためここには置かない。
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9641521924497538"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
