      - heading "当サイトについて" [level=2] [ref=e10]
      - paragraph [ref=e11]: 麻雀点数トレーニングは、麻雀の点数計算（符・翻・点数）をスマホWebで反復練習できるドリルアプリです。ランダムに出題される和了形を見て、正しい点数や符を4択から選び、間違えた際にはその理由（役・翻・符・計算式）を解説する形で、実戦で使える点数計算力を身につけることを目的としています。
