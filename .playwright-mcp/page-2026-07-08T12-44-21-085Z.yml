- generic [ref=e3]:
    - main [ref=e4]:
        - generic [ref=e5]:
            - heading "プライバシーポリシー" [level=1] [ref=e6]
            - link "ホーム" [ref=e8] [cursor=pointer]:
                - /url: /
        - paragraph [ref=e9]: 麻雀点数トレーニング（以下「当サイト」といいます）は、ユーザーの個人情報を含む情報の取扱いについて、以下のとおりプライバシーポリシー（以下「本ポリシー」といいます）を定めます。
        - region "第1条 個人情報" [ref=e10]:
            - heading "第1条（個人情報）" [level=2] [ref=e11]
            - paragraph [ref=e12]: 「個人情報」とは、個人情報保護法にいう「個人情報」を指すものとし、生存する個人に関する情報であって、当該情報に含まれる氏名、生年月日、住所、電話番号、連絡先その他の記述等により特定の個人を識別できる情報を指します。
            - paragraph [ref=e13]: 現時点で当サイトは、ユーザー登録機能を提供しておらず、個人情報を積極的に収集する機能はありません。
        - region "第2条 広告の配信について" [ref=e14]:
            - heading "第2条（広告の配信について）" [level=2] [ref=e15]
            - paragraph [ref=e16]: 当サイトは、第三者配信の広告サービス（Google AdSense など）を利用しています。
            - paragraph [ref=e17]: このような広告配信事業者は、ユーザーの興味に応じた商品やサービスの広告を表示するため、当サイトや他サイトへのアクセスに関する情報（氏名、住所、メールアドレス、電話番号は含まれません）を、Cookie（クッキー）を使用して収集し利用することがあります。
            - list [ref=e18]:
                - listitem [ref=e19]: Google などの第三者配信事業者は、Cookie を使用して、ユーザーが当サイトや他のサイトに過去にアクセスした際の情報に基づいて広告を配信します。
                - listitem [ref=e20]:
                    - text: ユーザーは、Google の
                    - link "広告設定ページ" [ref=e21] [cursor=pointer]:
                        - /url: https://adssettings.google.com/
                    - text: で、パーソナライズ広告を無効にできます。
                - listitem [ref=e22]:
                    - text: また、
                    - link "aboutads.info" [ref=e23] [cursor=pointer]:
                        - /url: https://optout.aboutads.info/
                    - text: のページにアクセスすることで、パーソナライズ広告に使用される第三者配信事業者の Cookie を無効にできます。
                - listitem [ref=e24]:
                    - text: Google の広告における Cookie の取り扱いの詳細については、Google の
                    - link "「広告 – ポリシーと規約」ページ" [ref=e25] [cursor=pointer]:
                        - /url: https://policies.google.com/technologies/ads
                    - text: をご覧ください。
        - region "第3条 アクセス解析ツールについて" [ref=e26]:
            - heading "第3条（アクセス解析ツールについて）" [level=2] [ref=e27]
            - paragraph [ref=e28]: 当サイトでは、サイトの利用状況を把握するためにアクセス解析ツール（Google Analytics など）を導入する場合があります。これらのツールはデータ収集のために Cookie を使用することがあります。このデータは匿名で収集されており、個人を特定するものではありません。
            - paragraph [ref=e29]: アクセス解析ツールを導入する際は、本ポリシーを改定のうえ、その旨を明記します。
        - region "第4条 個人情報を収集・利用する目的" [ref=e30]:
            - heading "第4条（個人情報を収集・利用する目的）" [level=2] [ref=e31]
            - paragraph [ref=e32]: 当サイトが個人情報を取得・収集する場合、その利用目的は以下のとおりです。
            - list [ref=e33]:
                - listitem [ref=e34]: お問い合わせへの対応のため
                - listitem [ref=e35]: サービスの改善・新機能開発のため
        - region "第5条 個人情報の第三者提供" [ref=e36]:
            - heading "第5条（個人情報の第三者提供）" [level=2] [ref=e37]
            - paragraph [ref=e38]: 当サイトは、次に掲げる場合を除いて、あらかじめユーザーの同意を得ることなく、第三者に個人情報を提供することはありません。ただし、個人情報保護法その他の法令で認められる場合を除きます。
            - list [ref=e39]:
                - listitem [ref=e40]: 法令に基づく場合
                - listitem [ref=e41]: 人の生命、身体または財産の保護のために必要がある場合であって、本人の同意を得ることが困難であるとき
        - region "第6条 プライバシーポリシーの変更" [ref=e42]:
            - heading "第6条（プライバシーポリシーの変更）" [level=2] [ref=e43]
            - paragraph [ref=e44]: 本ポリシーの内容は、法令その他本ポリシーに別段の定めのある事項を除いて、ユーザーに通知することなく変更することができるものとします。変更後のプライバシーポリシーについては、当サイトに掲載したときから効力を生じるものとします。
        - region "第7条 お問い合わせ窓口" [ref=e45]:
            - heading "第7条（お問い合わせ窓口）" [level=2] [ref=e46]
            - paragraph [ref=e47]: 本ポリシーに関するお問い合わせは、下記の窓口までお願いいたします。
            - paragraph [ref=e48]:
                - text: "お問い合わせフォーム:"
                - link "お問い合わせフォームを開く" [ref=e49] [cursor=pointer]:
                    - /url: https://docs.google.com/forms/d/e/1FAIpQLSfFnI4zqQTGDRO5ae4rxI5P8c2CkAx99UE9be1Sw4gQCxxoCA/viewform
