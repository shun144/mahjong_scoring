      - list [ref=e61]:
        - listitem [ref=e62]:
          - text: 「役牌以外の対子が雀頭ならOK」と思われがちですが、正しくは
          - strong [ref=e63]: 自風・場風・三元牌でなければOK
          - text: "です。役牌にあたらない字牌（例: 自分の風でも場の風でもない風牌）が雀頭でもピンフは成立します。"
        - listitem [ref=e64]:
          - text: ツモであがった場合、ピンフ単独ではツモ符（+2符）が付きません（
          - strong [ref=e65]: 平和ツモは20符固定
          - text: ）。これは「面子・待ちがすべて0符の手だから」で、符計算の中でも特に間違えやすいポイントです。
        - listitem [ref=e66]: 鳴くと崩れる役なので、チー・ポン・カンを一度でもすると、その時点でピンフの可能性はなくなります。
      - paragraph [ref=e67]:
        - strong [ref=e68]: 具体例
      - paragraph [ref=e69]: 上の牌姿は「④⑤⑥⑦⑧筒＋①②③索＋②③④萬＋九萬九萬」で、あがり牌は⑨筒です。 面子はすべて順子（456p・678p・123s・234m）、雀頭は九萬（役牌ではない）、待ちは⑦⑧筒からの両面待ちなので、ピンフが成立します。ツモならピンフのみで20符1翻、ロンなら門前加符が付いて30符1翻になります。
