          - text: 面子が4つとも
          - strong [ref=e52]: 順子
          - text: （数字が3つ連続した形）であること。刻子（同じ牌3枚）が1つでも混ざると成立しません。
        - listitem [ref=e53]:
          - text: 雀頭（対子）が
          - strong [ref=e54]: 役牌以外
          - text: であること。三元牌・自風牌・場風牌が雀頭だとピンフは崩れます。
        - listitem [ref=e55]:
          - text: あがり牌の待ちが
          - strong [ref=e56]: 両面待ち
          - text: であること。カンチャン（嵌張）・ペンチャン（辺張）・単騎・シャンポンでは成立しません。
        - listitem [ref=e57]:
          - strong [ref=e58]: 門前
          - text: （鳴いていない）でのみ成立します。
      - paragraph [ref=e59]:
