        - article [ref=f6e8]:
            - heading "麻雀の点数計算ガイド｜符・翻から点数を出す流れ" [level=1] [ref=f6e9]
            - paragraph [ref=f6e10]: 点数計算は、料理のレシピと同じで「作る順番」が決まっています。順番さえ覚えれば、どんな手でも同じやり方で点数を出せます。このページで全体の流れをつかんで、細かい部分は各記事で深掘りしてください。
            - blockquote [ref=f6e11]:
                - paragraph [ref=f6e12]:
                    - text: 「符」「翻（ハン）」「点数」の関係をつかんだら、
                    - link "麻雀点数トレーニング" [ref=f6e13] [cursor=pointer]:
                        - /url: /
                    - text: でガンガン練習してみてください。
            - heading "点数が決まる3ステップ" [level=2] [ref=f6e14]
            - paragraph [ref=f6e15]:
                - img "符→翻→点数の3ステップ図" [ref=f6e16]:
                    - img "符→翻→点数の3ステップ図" [ref=f6e17]
            - paragraph [ref=f6e18]: 点数は、次の3ステップで必ず決まります。
            - list [ref=f6e19]:
                - listitem [ref=f6e20]:
                    - strong [ref=f6e21]: 符を数える
                    - text: （あがりの「形」を点にする）
                - listitem [ref=f6e22]:
                    - strong [ref=f6e23]: 翻を数える
                    - text: （役とドラを合計する）
                - listitem [ref=f6e24]:
                    - strong [ref=f6e25]: 符と翻を点数に変える
                    - text: （計算して点数を出す）
            - paragraph [ref=f6e26]: この順番はどんな手でも変わりません。まずはこの3つがあることだけ覚えてください。
            - heading "このページでずっと使う例" [level=3] [ref=f6e27]
            - paragraph [ref=f6e28]: 説明がバラバラにならないよう、次の1つの手をゴールまで一緒に追いかけます。
            - blockquote [ref=f6e29]:
                - paragraph [ref=f6e30]:
                    - strong [ref=f6e31]: 例：門前（鳴いていない）でツモあがり。リーチもかけた。5萬が3枚そろった暗刻があり、タンヤオも成立。待ちは両面待ち。
            - paragraph [ref=f6e32]: この手を最後に点数まで出しきります。
            - heading "ステップ1：符を数える" [level=2] [ref=f6e33]
            - paragraph [ref=f6e34]: 点数計算で一番の難所がこの符です。ここさえクリアすれば、あとは一気に楽になります。
            - paragraph [ref=f6e35]: 符とは、かんたんに言うと「あがりの形の複雑さ」を点にしたものです。難しい形であるほど符が高くなります。
            - heading "まず20符からスタート" [level=3] [ref=f6e36]
            - paragraph [ref=f6e37]:
                - text: どんな手も、最初に
                - strong [ref=f6e38]: 20符
                - text: をもらえます。ここから、条件を満たすたびに符をたし算していきます。
            - paragraph [ref=f6e39]: たす条件は、大きく分けて4つです。
