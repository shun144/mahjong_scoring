                    - img "符の内訳の積み上げ図" [ref=f6e129]
            - paragraph [ref=f6e130]: さっきの例（門前ツモ・5萬の暗刻・両面待ち）で数えてみましょう。
            - list [ref=f6e131]:
                - listitem [ref=f6e132]:
                    - text: 基本：
                    - strong [ref=f6e133]: 20符
                - listitem [ref=f6e134]:
                    - text: ツモであがった：
                    - strong [ref=f6e135]: +2符
                - listitem [ref=f6e136]:
                    - text: 5萬（中張牌）の暗刻：
                    - strong [ref=f6e137]: +4符
                - listitem [ref=f6e138]:
                    - text: 両面待ち：
                    - strong [ref=f6e139]: +0符
                - listitem [ref=f6e140]:
                    - text: 雀頭は普通の牌：
                    - strong [ref=f6e141]: +0符
            - paragraph [ref=f6e142]:
                - text: 合計は
                - strong [ref=f6e143]: 20＋2＋4＝26符
                - text: 。
            - paragraph [ref=f6e144]:
                - text: 最後に
                - strong [ref=f6e145]: 10符の位で切り上げ
                - text: るので、26符 →
                - strong [ref=f6e146]: 30符
                - text: になります。この「切り上げ」を忘れる人がとても多いので注意してください。
            - heading "覚えておく2つの例外" [level=3] [ref=f6e147]
            - list [ref=f6e148]:
                - listitem [ref=f6e149]:
                    - strong [ref=f6e150]: 平和ツモ
                    - text: は計算せず
                    - strong [ref=f6e151]: 20符で固定
                - listitem [ref=f6e152]:
                    - strong [ref=f6e153]: 七対子
                    - text: は計算せず
                    - strong [ref=f6e154]: 25符で固定
            - paragraph [ref=f6e155]: 詳しくは「符計算のやり方」へ。
            - heading "ステップ2：翻を数える" [level=2] [ref=f6e156]
            - paragraph [ref=f6e157]:
                - text: 翻は、成立した
                - strong [ref=f6e158]: 役の翻数＋ドラの数
                - text: をぜんぶ足したものです。役が1つもないとあがれない、という点にも注意してください。
            - paragraph [ref=f6e159]:
                - img "主要な役の翻数の例" [ref=f6e160]:
                    - img "主要な役の翻数の例" [ref=f6e161]
                - emphasis [ref=f6e162]: リーチ1翻・タンヤオ1翻・ホンイツ2/3翻…など主要役を一覧表で
            - paragraph [ref=f6e163]: さっきの例では、次の役がそろっています。
            - list [ref=f6e164]:
                - listitem [ref=f6e165]: リーチ：1翻
                - listitem [ref=f6e166]: 門前ツモ：1翻
                - listitem [ref=f6e167]: タンヤオ：1翻
            - paragraph [ref=f6e168]:
                - text: 合計で
                - strong [ref=f6e169]: 3翻
                - text: です。（今回はドラなし）
            - paragraph [ref=f6e170]: なお、鳴くと翻が減る役（食い下がり）もあります。詳しくは「役一覧」へ。
            - heading "ステップ3：点数に変換する" [level=2] [ref=f6e171]
            - paragraph [ref=f6e172]: いよいよ、符と翻を点数に変えます。使う式はこれ1本です。
            - code [ref=f6e174]: 基本点 = 符 × 2^(2 + 翻)
            - paragraph [ref=f6e175]:
                - code [ref=f6e176]: 2^(2+翻)
                - text: は「2 を（2＋翻数）回かける」という意味です。今回は3翻なので、
                - code [ref=f6e177]: 2 + 3 = 5
                - text: 。
                - strong [ref=f6e178]: 2を5回かけると 32
                - text: になります。
            - paragraph [ref=f6e179]: だから、さっきの例（30符・3翻）の基本点は、
            - code [ref=f6e181]: 基本点 = 30 × 32 = 960
            - paragraph [ref=f6e182]:
                - text: この
                - strong [ref=f6e183]: 基本点に、親か子か・ロンかツモかで倍率
                - text: をかけて、実際の点数にします。
