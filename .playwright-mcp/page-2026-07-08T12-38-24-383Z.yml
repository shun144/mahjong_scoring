      - heading "ステップ3：点数に変換する" [level=2] [ref=e171]
      - paragraph [ref=e172]: いよいよ、符と翻を点数に変えます。使う式はこれ1本です。
      - code [ref=e174]: 基本点 = 符 × 2^(2 + 翻)
      - paragraph [ref=e175]:
        - code [ref=e176]: 2^(2+翻)
        - text: は「2 を（2＋翻数）回かける」という意味です。今回は3翻なので、
        - code [ref=e177]: 2 + 3 = 5
        - text: 。
        - strong [ref=e178]: 2を5回かけると 32
        - text: になります。
      - paragraph [ref=e179]: だから、さっきの例（30符・3翻）の基本点は、
      - code [ref=e181]: 基本点 = 30 × 32 = 960
