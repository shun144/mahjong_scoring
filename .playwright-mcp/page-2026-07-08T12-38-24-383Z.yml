      - paragraph [ref=e10]: 点数計算は、料理のレシピと同じで「作る順番」が決まっています。順番さえ覚えれば、どんな手でも同じやり方で点数を出せます。このページで全体の流れをつかんで、細かい部分は各記事で深掘りしてください。
      - blockquote [ref=e11]:
        - paragraph [ref=e12]:
          - text: 「符」「翻（ハン）」「点数」の関係をつかんだら、
          - link "麻雀点数トレーニング" [ref=e13] [cursor=pointer]:
            - /url: /
          - text: でガンガン練習してみてください。
