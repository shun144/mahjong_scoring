          - img "符→翻→点数の3ステップ図" [ref=e17]
      - paragraph [ref=e18]: 点数は、次の3ステップで必ず決まります。
      - list [ref=e19]:
        - listitem [ref=e20]:
          - strong [ref=e21]: 符を数える
          - text: （あがりの「形」を点にする）
        - listitem [ref=e22]:
          - strong [ref=e23]: 翻を数える
          - text: （役とドラを合計する）
        - listitem [ref=e24]:
          - strong [ref=e25]: 符と翻を点数に変える
          - text: （計算して点数を出す）
      - paragraph [ref=e26]: この順番はどんな手でも変わりません。まずはこの3つがあることだけ覚えてください。
      - heading "このページでずっと使う例" [level=3] [ref=e27]
      - paragraph [ref=e28]: 説明がバラバラにならないよう、次の1つの手をゴールまで一緒に追いかけます。
